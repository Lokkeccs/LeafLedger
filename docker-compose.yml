version: '3.9'

services:
  db:
    image: postgres:17
    container_name: leafledger-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leafledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-leafledger_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leafledger} -d ${POSTGRES_DB:-leafledger_dev}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: src/LeafLedger.Host/Dockerfile
    container_name: leafledger-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=${POSTGRES_DB:-leafledger_dev};Username=${POSTGRES_USER:-leafledger};Password=${POSTGRES_PASSWORD:-devpassword}"
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  postgres-data:
    driver: local
