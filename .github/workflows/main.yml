name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, page budget)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run check:page-budget

  backend:
    name: Backend (build, test, arch test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release --no-build

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: npm audit (high+)
        working-directory: app
        run: npm audit --audit-level=high
      - name: dotnet vulnerable packages
        working-directory: backend
        shell: bash
        run: |
          dotnet restore
          output=$(dotnet list package --vulnerable --include-transitive)
          echo "$output"
          if echo "$output" | grep -q 'has the following vulnerable packages'; then
            echo 'Vulnerable NuGet packages found.'
            exit 1
          fi

  deploy-api:
    name: Deploy API (placeholder)
    runs-on: ubuntu-latest
    needs: [frontend, backend, gitleaks, dependency-audit]
    steps:
      - run: echo "No-op — real API deploy wired in P2/P3."

  deploy-frontend:
    name: Deploy frontend (placeholder)
    runs-on: ubuntu-latest
    needs: [frontend, backend, gitleaks, dependency-audit]
    steps:
      - run: echo "No-op — real Vercel deploy wired in P3."
