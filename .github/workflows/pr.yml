name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, page budget)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run check:page-budget

  backend:
    name: Backend (build, test, arch test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet build --configuration Release
      # Unit + architecture tests only; integration and property tests run in their
      # dedicated Docker-backed jobs below.
      - run: dotnet test --configuration Release --no-build --filter "Category!=Integration&Category!=Property"

  property:
    name: Financial invariant properties (Testcontainers Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet test tests/LeafLedger.IntegrationTests --configuration Release --filter "Category=Property"

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  contract:
    name: Contract (OpenAPI diff gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      # Re-emit the canonical OpenAPI contract from the backend build.
      - name: Build backend (emits OpenAPI contract)
        working-directory: backend
        run: dotnet build src/LeafLedger.Host/LeafLedger.Host.csproj --configuration Release
      - name: Install frontend deps
        working-directory: app
        run: npm ci
      # Regenerate the typed client from the freshly emitted contract.
      - name: Regenerate typed client
        working-directory: app
        run: npm run gen:api
      # Drift-killer: any difference between committed and regenerated fails.
      # `git add -N` surfaces any newly-generated (untracked) files too.
      - name: Fail on contract or client drift
        run: |
          git add -N backend/openapi app/src/api
          git diff --exit-code -- backend/openapi app/src/api

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: npm audit (high+)
        working-directory: app
        run: npm audit --audit-level=high
      - name: dotnet vulnerable packages
        working-directory: backend
        shell: bash
        run: |
          dotnet restore
          output=$(dotnet list package --vulnerable --include-transitive)
          echo "$output"
          if echo "$output" | grep -q 'has the following vulnerable packages'; then
            echo 'Vulnerable NuGet packages found.'
            exit 1
          fi
